<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin — Build Believe Fit</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
:root{--pur:#6a0dad;--yel:#f5c800;--blk:#060606;--card:#111;--brd:#1e1e1e;--mut:#888;--grn:#22c55e;--red:#ef4444;--orn:#f59e0b}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--blk);color:#f0f0f0;font-family:'Barlow Condensed',sans-serif;min-height:100vh}
.gate{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.gate-box{background:var(--card);border:1px solid var(--brd);border-radius:12px;padding:2.5rem;max-width:380px;width:100%;text-align:center}
.gate-t{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;letter-spacing:3px;color:var(--yel);margin-bottom:1rem}
.gate-input{width:100%;background:#0a0a0a;border:1px solid var(--brd);color:#fff;padding:12px 16px;font-family:'Barlow Condensed',sans-serif;font-size:1rem;border-radius:6px;outline:none;margin-bottom:1rem;text-align:center;letter-spacing:4px}.gate-input:focus{border-color:var(--pur)}
.gate-btn{width:100%;background:var(--yel);color:var(--blk);font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:3px;padding:12px;border:none;border-radius:6px;cursor:pointer}
.gate-err{color:var(--red);font-size:.82rem;margin-top:.5rem;min-height:1.2rem}
.dash{display:none;padding:24px;max-width:800px;margin:0 auto}
.dash.on{display:block}
.hdr{text-align:center;margin-bottom:2rem;padding-bottom:1.5rem;border-bottom:1px solid var(--brd)}
.hdr-t{font-family:'Bebas Neue',sans-serif;font-size:2.5rem;letter-spacing:3px;color:#fff}.hdr-t span{color:var(--yel)}
.hdr-s{font-size:.85rem;color:var(--mut);margin-top:.3rem}
.client-card{background:var(--card);border:1px solid var(--brd);border-radius:10px;padding:1.2rem 1.5rem;margin-bottom:.8rem;display:flex;align-items:center;gap:1rem;flex-wrap:wrap}
.cc-av{width:42px;height:42px;border-radius:50%;background:var(--pur);border:2px solid var(--yel);display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:1rem;color:var(--yel);flex-shrink:0}
.cc-info{flex:1;min-width:140px}
.cc-name{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:2px;color:#fff}
.cc-meta{font-size:.75rem;color:var(--mut)}
.cc-controls{display:flex;gap:6px;flex-shrink:0}
.cc-btn{font-family:'Bebas Neue',sans-serif;font-size:.72rem;letter-spacing:2px;padding:6px 14px;border:1px solid var(--brd);background:transparent;color:var(--mut);border-radius:4px;cursor:pointer;transition:all .2s}
.cc-btn.on{font-weight:900}
.cc-btn.unlocked.on{background:rgba(34,197,94,.15);border-color:rgba(34,197,94,.4);color:var(--grn)}
.cc-btn.locked.on{background:rgba(239,68,68,.1);border-color:rgba(239,68,68,.3);color:var(--red)}
.cc-btn.recovery.on{background:rgba(245,158,11,.1);border-color:rgba(245,158,11,.3);color:var(--orn)}
.cc-timer{font-size:.7rem;color:var(--orn);margin-top:.3rem}
.auto-row{display:flex;align-items:center;gap:.6rem;margin-top:.5rem;width:100%}
.auto-row label{font-size:.68rem;font-weight:700;letter-spacing:1px;color:var(--mut);text-transform:uppercase}
.auto-toggle{width:36px;height:20px;background:var(--brd);border-radius:10px;position:relative;cursor:pointer;transition:background .2s;flex-shrink:0}
.auto-toggle.on{background:var(--orn)}
.auto-toggle::after{content:'';position:absolute;top:2px;left:2px;width:16px;height:16px;border-radius:50%;background:#fff;transition:transform .2s}
.auto-toggle.on::after{transform:translateX(16px)}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--pur);border:1px solid var(--yel);padding:.7rem 1.5rem;border-radius:8px;font-size:.85rem;font-weight:700;color:#fff;z-index:500;opacity:0;transition:all .3s;pointer-events:none}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<div class="gate" id="gate">
<div class="gate-box">
<div class="gate-t">&#x1F512; ADMIN ACCESS</div>
<input type="password" class="gate-input" id="gate-pin" placeholder="ENTER PIN" maxlength="6">
<button class="gate-btn" onclick="authAdmin()">AUTHENTICATE</button>
<div class="gate-err" id="gate-err"></div>
</div>
</div>

<div class="dash" id="dash">
<div class="hdr">
<div class="hdr-t">CLIENT <span>COMMAND CENTER</span></div>
<div class="hdr-s">Access Control &bull; Recovery Mode &bull; Session Locks</div>
</div>
<div id="client-list"></div>
</div>

<div class="toast" id="admin-toast"></div>

<script>
var ADMIN_PIN = '8137';
var K = 'bbf_v7';

function GD(){try{return JSON.parse(localStorage.getItem(K))||{u:{},l:{},w:{}};}catch(e){return{u:{},l:{},w:{}};}}
function SD(d){localStorage.setItem(K,JSON.stringify(d));}

function authAdmin(){
  var pin = document.getElementById('gate-pin').value.trim();
  if (pin === ADMIN_PIN) {
    document.getElementById('gate').style.display = 'none';
    document.getElementById('dash').classList.add('on');
    renderClients();
  } else {
    document.getElementById('gate-err').textContent = 'Invalid PIN. Access denied.';
  }
}
document.getElementById('gate-pin').addEventListener('keydown',function(e){if(e.key==='Enter')authAdmin();});

function toast(msg){
  var t=document.getElementById('admin-toast');t.innerHTML=msg;t.classList.add('on');
  setTimeout(function(){t.classList.remove('on');},2500);
}

function renderClients(){
  var d = GD();
  var clients = Object.entries(d.u).filter(function(e){return e[1].role==='client';});
  var wrap = document.getElementById('client-list');
  wrap.innerHTML = clients.map(function(e){
    var uid = e[0], u = e[1];
    var status = u.access_status || 'unlocked';
    var autoLock = u.auto_lock_enabled || false;
    var lockExpiry = u.lock_expiry || null;
    var timerHTML = '';
    if (lockExpiry && status === 'unlocked') {
      var remaining = Math.max(0, Math.round((lockExpiry - Date.now()) / 3600000));
      if (remaining > 0) timerHTML = '<div class="cc-timer">&#x23F0; Auto-locks in ' + remaining + 'h</div>';
      else { u.access_status = 'locked'; d.u[uid] = u; SD(d); status = 'locked'; }
    }
    return '<div class="client-card">' +
      '<div class="cc-av">' + (u.name||uid||'?')[0].toUpperCase() + '</div>' +
      '<div class="cc-info"><div class="cc-name">' + (u.name||uid) + '</div><div class="cc-meta">' + (u.type||'Client') + ' &bull; ' + (u.goal||'No goal set') + '</div>' + timerHTML + '</div>' +
      '<div class="cc-controls">' +
      '<button class="cc-btn unlocked' + (status==='unlocked'?' on':'') + '" onclick="setAccess(\'' + uid + '\',\'unlocked\')">&#x2705; OPEN</button>' +
      '<button class="cc-btn locked' + (status==='locked'?' on':'') + '" onclick="setAccess(\'' + uid + '\',\'locked\')">&#x1F512; LOCK</button>' +
      '<button class="cc-btn recovery' + (status==='recovery'?' on':'') + '" onclick="setAccess(\'' + uid + '\',\'recovery\')">&#x1FA79; RECOVERY</button>' +
      '</div>' +
      '<div class="auto-row">' +
      '<div class="auto-toggle' + (autoLock?' on':'') + '" onclick="toggleAutoLock(\'' + uid + '\',this)"></div>' +
      '<label>12h Auto-Lock</label>' +
      '</div>' +
      '</div>';
  }).join('');
}

function setAccess(uid, status){
  var d = GD();
  if (!d.u[uid]) return;
  d.u[uid].access_status = status;
  if (status === 'unlocked' && d.u[uid].auto_lock_enabled) {
    d.u[uid].lock_expiry = Date.now() + (12 * 3600000);
  } else {
    d.u[uid].lock_expiry = null;
  }
  SD(d);
  renderClients();
  var labels = {unlocked:'&#x2705; UNLOCKED',locked:'&#x1F512; LOCKED',recovery:'&#x1FA79; RECOVERY MODE'};
  toast((d.u[uid].name||uid) + ' — ' + (labels[status]||status));
}

function toggleAutoLock(uid, el){
  var d = GD();
  if (!d.u[uid]) return;
  d.u[uid].auto_lock_enabled = !d.u[uid].auto_lock_enabled;
  if (!d.u[uid].auto_lock_enabled) d.u[uid].lock_expiry = null;
  SD(d);
  el.classList.toggle('on');
  toast((d.u[uid].name||uid) + ' — Auto-lock ' + (d.u[uid].auto_lock_enabled?'ON':'OFF'));
}
</script>
</body>
</html>
