<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Global Scouting Hub — Build Believe Fit</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700;900&display=swap" rel="stylesheet">
<script src="bbf-lang.js"></script>
<style>
:root{--pur:#6a0dad;--purl:#8b1fd4;--yel:#f5c800;--blk:#0a0a0a;--card:#111;--brd:#1e1e1e;--mut:#888;--grn:#22c55e;--red:#ef4444;--blu:#3b82f6;--cyan:#22d3ee}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--blk);color:#f0f0f0;font-family:'Barlow Condensed',sans-serif;min-height:100vh}
.hdr{background:linear-gradient(135deg,#0a0a0a 0%,#1a0030 60%,#0a0a0a 100%);border-bottom:2px solid var(--yel);padding:28px 24px 18px;position:relative;overflow:hidden;text-align:center}
.hdr::before{content:'';position:absolute;top:-100px;left:50%;transform:translateX(-50%);width:600px;height:600px;background:radial-gradient(circle,rgba(106,13,173,.2) 0%,transparent 70%);pointer-events:none}
.hdr-b{font-family:'Bebas Neue',sans-serif;font-size:12px;letter-spacing:6px;color:var(--yel);opacity:.8}
.hdr-t{font-family:'Bebas Neue',sans-serif;font-size:clamp(32px,5vw,52px);line-height:1;color:#fff;margin-top:4px}.hdr-t span{color:var(--yel)}
.hdr-s{font-size:14px;font-weight:500;letter-spacing:3px;color:var(--mut);margin-top:6px;text-transform:uppercase}
.lang-bar{position:fixed;top:12px;right:12px;z-index:200;display:flex;background:rgba(10,10,10,.92);border:1px solid var(--brd);border-radius:6px;overflow:hidden;backdrop-filter:blur(12px)}
.lang-bar button{padding:6px 12px;font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:2px;background:transparent;border:none;color:var(--mut);cursor:pointer;border-right:1px solid var(--brd)}.lang-bar button:last-child{border-right:none}
.cnt{max-width:1100px;margin:0 auto;padding:32px 20px}
.sgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin-bottom:32px}
.sc{background:var(--card);border:2px solid var(--brd);border-radius:8px;padding:28px 20px;text-align:center;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.sc:hover{border-color:var(--pur);transform:translateY(-3px)}
.sc.on{border-color:var(--yel);box-shadow:0 0 30px rgba(245,200,0,.1)}
.sc-icon{font-size:3rem;margin-bottom:12px}
.sc-name{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;letter-spacing:2px;color:#fff}
.sc-sub{font-size:.78rem;color:var(--mut);margin-top:4px}
.sc::after{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--pur);transition:background .2s}.sc.on::after{background:var(--yel)}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:100;overflow-y:auto;padding:24px}
.overlay.on{display:flex;align-items:flex-start;justify-content:center}
.opanel{background:var(--card);border:1px solid var(--brd);border-radius:12px;padding:32px;max-width:680px;width:100%;margin:40px auto;position:relative}
.oclose{position:absolute;top:12px;right:16px;background:none;border:none;color:var(--mut);font-size:1.5rem;cursor:pointer}
.otag{font-family:'Bebas Neue',sans-serif;font-size:11px;letter-spacing:5px;color:var(--purl);margin-bottom:4px;text-transform:uppercase}
.otitle{font-family:'Bebas Neue',sans-serif;font-size:clamp(24px,4vw,38px);color:#fff;margin-bottom:4px}.otitle span{color:var(--yel)}
.osub{font-size:14px;color:var(--mut);margin-bottom:24px}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
@media(max-width:500px){.fg{grid-template-columns:1fr}}
.ff{display:flex;flex-direction:column;gap:4px}
.ff label{font-size:.68rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--mut)}
.ff input,.ff select{background:#0a0a0a;border:1px solid var(--brd);color:#fff;padding:10px 14px;font-family:'Barlow Condensed',sans-serif;font-size:.95rem;border-radius:4px;outline:none;transition:border-color .2s;-webkit-appearance:none}.ff input:focus,.ff select:focus{border-color:var(--pur)}
.sbtn{width:100%;background:var(--yel);color:var(--blk);font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:3px;padding:14px;border:none;border-radius:6px;cursor:pointer;margin-top:16px;transition:all .2s}.sbtn:hover{transform:translateY(-1px);box-shadow:0 6px 24px rgba(245,200,0,.3)}
.report{display:none;margin-top:24px;border-top:1px solid var(--brd);padding-top:24px}
.report.on{display:block}
.rh{font-family:'Bebas Neue',sans-serif;font-size:1.5rem;letter-spacing:2px;color:var(--yel);margin-bottom:16px}
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px;margin-bottom:20px}
.mc{background:#0a0a0a;border:1px solid var(--brd);border-radius:4px;padding:14px;text-align:center}
.mc-v{font-family:'Bebas Neue',sans-serif;font-size:2rem;line-height:1}.mc-l{font-size:.65rem;letter-spacing:2px;color:var(--mut);text-transform:uppercase;margin-top:2px}
.mc.grn .mc-v{color:var(--grn)}.mc.yel .mc-v{color:var(--yel)}.mc.red .mc-v{color:var(--red)}.mc.blu .mc-v{color:var(--blu)}
.bench{background:rgba(106,13,173,.1);border:1px solid rgba(106,13,173,.3);border-radius:6px;padding:16px;margin-bottom:16px}
.bench-t{font-family:'Bebas Neue',sans-serif;font-size:.85rem;letter-spacing:3px;color:var(--purl);margin-bottom:10px}
.bench-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.05);font-size:.85rem}.bench-row:last-child{border-bottom:none}
.bench-row .lbl{color:var(--mut)}.bench-row .val{font-weight:700}
.bench-row .val.above{color:var(--grn)}.bench-row .val.below{color:var(--red)}.bench-row .val.meets{color:var(--yel)}
.bio{background:linear-gradient(135deg,rgba(106,13,173,.15),rgba(0,0,0,.3));border:1px solid var(--pur);border-radius:6px;padding:16px;margin-bottom:16px}
.bio-t{font-family:'Bebas Neue',sans-serif;font-size:.85rem;letter-spacing:3px;color:var(--yel);margin-bottom:8px}
.bio-txt{font-size:.88rem;color:#ccc;line-height:1.6}
.seal{background:linear-gradient(135deg,#1a0030,#0a0a0a);border:1px solid var(--yel);border-radius:6px;padding:16px;margin-top:20px;text-align:center}
.seal-icon{font-size:1.5rem;margin-bottom:6px}
.seal-t{font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:2px;color:var(--yel)}
.seal-s{font-size:.72rem;color:var(--mut);margin-top:4px}
.tier-lock{background:rgba(245,200,0,.06);border:1px solid rgba(245,200,0,.2);border-radius:6px;padding:12px;text-align:center;margin-bottom:12px}
.tier-lock-t{font-family:'Bebas Neue',sans-serif;font-size:.8rem;letter-spacing:2px;color:var(--yel)}
.tier-lock-s{font-size:.75rem;color:var(--mut);margin-top:2px}
</style>
</head>
<body>
<div class="lang-bar" id="lb">
<button onclick="BBF_LANG.set('en')" id="lt-en">EN</button>
<button onclick="BBF_LANG.set('es')" id="lt-es">ES</button>
<button onclick="BBF_LANG.set('pt')" id="lt-pt">PT</button>
</div>
<div class="hdr">
<div class="hdr-b">BUILD BELIEVE FIT LLC</div>
<div class="hdr-t">GLOBAL SCOUTING <span>HUB</span></div>
<div class="hdr-s">Multi-Sport Combine Analysis &bull; Trilingual &bull; NASM-Certified</div>
</div>
<div class="cnt">
<div class="sgrid" id="sgrid"></div>
</div>
<div class="overlay" id="overlay">
<div class="opanel" id="opanel">
<button class="oclose" onclick="closeOverlay()">&times;</button>
<div id="oinner"></div>
</div>
</div>
<script>
// ─── SPORT CONFIGS ─────────────────────────────────
var SPORTS = [
  {id:'football',icon:'\uD83C\uDFC8',name:'Football',sub:'Combine · Position-Specific',
   fields:[
     {id:'forty',label:'40-Yard Dash (sec)',type:'number',ph:'4.55'},
     {id:'bench',label:'Bench Press (225 lbs reps)',type:'number',ph:'22'},
     {id:'vert',label:'Vertical Jump (inches)',type:'number',ph:'36'},
     {id:'shuttle',label:'Short Shuttle (sec)',type:'number',ph:'4.20'},
     {id:'broad',label:'Broad Jump (inches)',type:'number',ph:'120'},
     {id:'pos',label:'Position',type:'select',opts:['QB','RB','WR','TE','OL','DL','LB','DB','K/P']}
   ],
   benchmarks:{
     QB:{forty:4.75,vert:32,broad:108,bench:14},RB:{forty:4.48,vert:36,broad:120,bench:20},
     WR:{forty:4.45,vert:38,broad:124,bench:15},TE:{forty:4.65,vert:34,broad:116,bench:22},
     OL:{forty:5.20,vert:28,broad:96,bench:30},DL:{forty:4.85,vert:32,broad:108,bench:28},
     LB:{forty:4.60,vert:35,broad:118,bench:24},DB:{forty:4.42,vert:38,broad:126,bench:16}
   }
  },
  {id:'basketball',icon:'\uD83C\uDFC0',name:'Basketball',sub:'Combine · Ape Index Analysis',
   fields:[
     {id:'height',label:'Height (inches)',type:'number',ph:'76'},
     {id:'wingspan',label:'Wingspan (inches)',type:'number',ph:'80'},
     {id:'reach',label:'Standing Reach (inches)',type:'number',ph:'102'},
     {id:'vert',label:'Vertical Jump (inches)',type:'number',ph:'34'},
     {id:'lane',label:'Lane Agility (sec)',type:'number',ph:'11.2'},
     {id:'pos',label:'Position',type:'select',opts:['PG','SG','SF','PF','C']}
   ],
   benchmarks:{
     PG:{height:74,wingspan:78,vert:36,lane:10.8},SG:{height:76,wingspan:80,vert:38,lane:11.0},
     SF:{height:79,wingspan:83,vert:36,lane:11.2},PF:{height:81,wingspan:86,vert:34,lane:11.5},
     C:{height:83,wingspan:88,vert:32,lane:11.8}
   }
  },
  {id:'soccer',icon:'\u26BD',name:'Soccer',sub:'Combine · VO2 Max Estimation',
   fields:[
     {id:'beep',label:'Beep Test (level.shuttle)',type:'text',ph:'12.4'},
     {id:'ttest',label:'Agility T-Test (sec)',type:'number',ph:'9.5'},
     {id:'sprint',label:'30m Sprint (sec)',type:'number',ph:'4.20'},
     {id:'yoyo',label:'Yo-Yo IR1 (meters)',type:'number',ph:'2080'},
     {id:'pos',label:'Position',type:'select',opts:['GK','CB','FB','CM','CAM','Winger','ST']}
   ],
   benchmarks:{
     GK:{beep:10,ttest:10.0,sprint:4.5},CB:{beep:11,ttest:9.8,sprint:4.3},
     FB:{beep:12,ttest:9.5,sprint:4.2},CM:{beep:13,ttest:9.3,sprint:4.2},
     CAM:{beep:12.5,ttest:9.2,sprint:4.1},Winger:{beep:12,ttest:9.0,sprint:4.0},
     ST:{beep:11.5,ttest:9.4,sprint:4.1}
   }
  },
  {id:'baseball',icon:'\u26BE',name:'Baseball / Softball',sub:'Combine · Rotational Power',
   fields:[
     {id:'sixty',label:'60-Yard Dash (sec)',type:'number',ph:'6.80'},
     {id:'medball',label:'Med-Ball Rot. Throw (mph)',type:'number',ph:'68'},
     {id:'velo',label:'Throwing Velocity (mph)',type:'number',ph:'85'},
     {id:'exit',label:'Exit Velocity (mph)',type:'number',ph:'92'},
     {id:'pos',label:'Position',type:'select',opts:['P','C','IF','OF','DH','Utility']}
   ],
   benchmarks:{
     P:{sixty:7.0,velo:88,medball:70},C:{sixty:7.2,velo:82,medball:65},
     IF:{sixty:6.7,velo:84,exit:92,medball:68},OF:{sixty:6.6,velo:86,exit:95,medball:70}
   }
  },
  {id:'volleyball',icon:'\uD83C\uDFD0',name:'Volleyball',sub:'Combine · Vertical Reach',
   fields:[
     {id:'block',label:'Block Reach (inches)',type:'number',ph:'118'},
     {id:'approach',label:'Approach Jump (inches)',type:'number',ph:'126'},
     {id:'standing',label:'Standing Reach (inches)',type:'number',ph:'96'},
     {id:'vert',label:'Vertical Jump (inches)',type:'number',ph:'28'},
     {id:'pos',label:'Position',type:'select',opts:['OH','MB','S','OPP','L/DS']}
   ],
   benchmarks:{
     OH:{block:112,approach:120,vert:26},MB:{block:118,approach:126,vert:24},
     S:{block:108,approach:116,vert:24},OPP:{block:114,approach:122,vert:26}
   }
  }
];

// ─── ACCESS LEVEL ──────────────────────────────────
function getAccess(){
  try{
    var d=JSON.parse(localStorage.getItem('bbf_v7')||'{}');
    var users=d.u||{};
    for(var k in users){if(users[k].role==='trainer')return 'legacy';}
    for(var k in users){
      if(users[k].type==='Platinum')return 'legacy';
      if(users[k].type==='Elite')return 'elite';
    }
  }catch(e){}
  return 'community';
}
var ACCESS=getAccess();

// ─── RENDER GRID ───────────────────────────────────
function renderGrid(){
  var g=document.getElementById('sgrid');
  g.innerHTML=SPORTS.map(function(s){
    return '<div class="sc" onclick="openSport(\''+s.id+'\')" id="sc-'+s.id+'"><div class="sc-icon">'+s.icon+'</div><div class="sc-name">'+s.name+'</div><div class="sc-sub">'+s.sub+'</div></div>';
  }).join('');
}

// ─── OPEN SPORT OVERLAY ────────────────────────────
var activeSport=null;
function openSport(id){
  activeSport=SPORTS.find(function(s){return s.id===id;});
  if(!activeSport)return;
  document.querySelectorAll('.sc').forEach(function(c){c.classList.remove('on');});
  document.getElementById('sc-'+id).classList.add('on');
  var h='<div class="otag">COMBINE INPUT</div><div class="otitle">'+activeSport.icon+' '+activeSport.name+' <span>Combine</span></div><div class="osub">Enter athlete metrics for analysis</div>';
  // Sport-switch dropdown — all five sports accessible from Phase 2 without re-opening
  h+='<div class="ff" style="margin-bottom:16px"><label>Select Sport</label><select id="ci-sport" onchange="openSport(this.value)">'+
    SPORTS.map(function(s){return '<option value="'+s.id+'"'+(s.id===activeSport.id?' selected':'')+'>'+s.name+'</option>';}).join('')+
    '</select></div>';
  h+='<div class="fg">';
  activeSport.fields.forEach(function(f){
    if(f.type==='select'){
      h+='<div class="ff"><label>'+f.label+'</label><select id="ci-'+f.id+'">'+f.opts.map(function(o){return '<option value="'+o+'">'+o+'</option>';}).join('')+'</select></div>';
    }else{
      h+='<div class="ff"><label>'+f.label+'</label><input type="'+f.type+'" id="ci-'+f.id+'" placeholder="'+f.ph+'"></div>';
    }
  });
  h+='</div>';
  h+='<button class="sbtn" onclick="runAnalysis()">ANALYZE COMBINE DATA \u2192</button>';
  h+='<div class="report" id="report"></div>';
  document.getElementById('oinner').innerHTML=h;
  document.getElementById('overlay').classList.add('on');
}
function closeOverlay(){document.getElementById('overlay').classList.remove('on');document.querySelectorAll('.sc').forEach(function(c){c.classList.remove('on');});}

// ─── ANALYSIS ENGINE ───────────────────────────────
function runAnalysis(){
  var data={};var sport=activeSport;
  sport.fields.forEach(function(f){
    var el=document.getElementById('ci-'+f.id);
    data[f.id]=f.type==='number'?parseFloat(el.value)||0:(el.value||'');
  });
  var pos=data.pos||'';
  var bm=(sport.benchmarks&&sport.benchmarks[pos])||null;
  var report=document.getElementById('report');
  var h='<div class="rh">'+sport.icon+' SCOUTING REPORT \u2014 '+pos+'</div>';

  // Raw Metrics (Community+)
  h+='<div class="metrics">';
  sport.fields.forEach(function(f){
    if(f.id==='pos')return;
    var v=data[f.id];if(!v)return;
    var cls='yel';
    if(bm&&bm[f.id]){
      var target=bm[f.id];
      var lower=['forty','shuttle','lane','ttest','sprint','sixty'];
      if(lower.indexOf(f.id)>-1){cls=v<=target?'grn':v<=target*1.05?'yel':'red';}
      else{cls=v>=target?'grn':v>=target*0.95?'yel':'red';}
    }
    h+='<div class="mc '+cls+'"><div class="mc-v">'+v+'</div><div class="mc-l">'+f.label.split('(')[0].trim()+'</div></div>';
  });
  h+='</div>';

  // Basketball Ape Index
  if(sport.id==='basketball'&&data.height&&data.wingspan){
    var ape=(data.wingspan/data.height).toFixed(2);
    var apeClass=ape>=1.05?'grn':ape>=1.0?'yel':'red';
    h+='<div class="mc '+apeClass+'" style="max-width:200px;margin-bottom:16px"><div class="mc-v">'+ape+'</div><div class="mc-l">Ape Index (Wingspan/Height)</div></div>';
  }

  // Soccer VO2 Max estimation
  if(sport.id==='soccer'&&data.beep){
    var parts=data.beep.toString().split('.');var lvl=parseInt(parts[0])||0;
    var vo2=(18.043461+(0.3689295*lvl*8)-(0.000349*Math.pow(lvl*8,2))).toFixed(1);
    h+='<div class="mc blu" style="max-width:200px;margin-bottom:16px"><div class="mc-v">'+vo2+'</div><div class="mc-l">Est. VO2 Max (ml/kg/min)</div></div>';
  }

  // Elite: Collegiate Benchmarking
  if((ACCESS==='elite'||ACCESS==='legacy')&&bm){
    h+='<div class="bench"><div class="bench-t">\uD83C\uDFDB COLLEGIATE PERFORMANCE BENCHMARKING</div>';
    for(var key in bm){
      var val=data[key];if(!val)continue;
      var target=bm[key];
      var lower=['forty','shuttle','lane','ttest','sprint','sixty'];
      var diff,cls2;
      if(lower.indexOf(key)>-1){diff=((target-val)/target*100).toFixed(1);cls2=val<=target?'above':val<=target*1.05?'meets':'below';}
      else{diff=((val-target)/target*100).toFixed(1);cls2=val>=target?'above':val>=target*0.95?'meets':'below';}
      var label=key.replace(/([A-Z])/g,' $1').replace(/^./,function(m){return m.toUpperCase();});
      h+='<div class="bench-row"><span class="lbl">'+label+'</span><span>Target: '+target+'</span><span>Yours: '+val+'</span><span class="val '+cls2+'">'+(parseFloat(diff)>0?'+':'')+diff+'%</span></div>';
    }
    h+='</div>';
  }else if(ACCESS==='community'&&bm){
    h+='<div class="tier-lock"><div class="tier-lock-t">\uD83D\uDD12 COLLEGIATE BENCHMARKS \u2014 ELITE TIER</div><div class="tier-lock-s">Upgrade to Elite to compare against collegiate standards</div></div>';
  }

  // Legacy: Biomechanical Potential
  if(ACCESS==='legacy'){
    h+='<div class="bio"><div class="bio-t">\uD83E\uDDBF BIOMECHANICAL POTENTIAL ANALYSIS</div><div class="bio-txt">Based on the submitted metrics, this athlete shows ';
    var score=0;var total=0;
    for(var key in bm){if(data[key]){total++;var t2=bm[key];var lower2=['forty','shuttle','lane','ttest','sprint','sixty'];if(lower2.indexOf(key)>-1){if(data[key]<=t2)score++;}else{if(data[key]>=t2)score++;}}}
    var pct=total>0?Math.round(score/total*100):0;
    h+=(pct>=80?'<strong style="color:var(--grn)">elite-level potential ('+pct+'% benchmarks met)</strong>. Recommend immediate collegiate exposure and targeted position development.':
        pct>=50?'<strong style="color:var(--yel)">strong developmental trajectory ('+pct+'% benchmarks met)</strong>. Targeted 12-week protocol recommended before next evaluation window.':
        '<strong style="color:var(--red)">foundational development phase ('+pct+'% benchmarks met)</strong>. Structured 16-week strength and speed protocol required. Focus on progressive overload and movement quality.');
    h+='</div></div>';
    h+='<div class="tier-lock" style="background:rgba(106,13,173,.1);border-color:var(--pur)"><div class="tier-lock-t">\uD83D\uDCC5 SCHEDULE 1-ON-1 FOUNDER AUDIT</div><div class="tier-lock-s">Text Akeem at 623-340-9254 for a personalized biomechanical review</div></div>';
  }else if(ACCESS==='elite'){
    h+='<div class="tier-lock"><div class="tier-lock-t">\uD83D\uDD12 BIOMECHANICAL ANALYSIS \u2014 LEGACY TIER</div><div class="tier-lock-s">Upgrade to Legacy for full biomechanical potential report + Founder Audit</div></div>';
  }

  // Founder's Seal
  h+='<div class="seal"><div class="seal-icon">\uD83C\uDFC6</div><div class="seal-t">BUILT BY AKEEM \u2022 FOUNDER OF BBF</div><div class="seal-s">Sovereign Gold Standard \u2022 Data-Driven \u2022 Results-Proven \u2022 Founder-Verified</div></div>';

  report.innerHTML=h;
  report.classList.add('on');
  report.scrollIntoView({behavior:'smooth',block:'start'});
}

// ─── INIT ──────────────────────────────────────────
renderGrid();
</script>
</body>
</html>
