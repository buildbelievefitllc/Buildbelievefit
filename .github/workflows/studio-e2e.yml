name: Studio v3 E2E

# Runs the Sovereign Studio v3 export-pipeline Playwright suite whenever the
# studio file or the e2e harness changes. The suite is hermetic (html2canvas is
# stubbed in-spec; the page is served locally), so it needs no secrets.

on:
  push:
    branches: [main]
    paths:
      - 'bbf-sovereign-studio-v3.html'
      - 'frontend/public/bbf-sovereign-studio-v3.html'
      - 'e2e/**'
      - '.github/workflows/studio-e2e.yml'
  pull_request:
    paths:
      - 'bbf-sovereign-studio-v3.html'
      - 'frontend/public/bbf-sovereign-studio-v3.html'
      - 'e2e/**'
      - '.github/workflows/studio-e2e.yml'
  workflow_dispatch:

jobs:
  studio-e2e:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: e2e
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      # No committed lockfile (package-lock.json is gitignored repo-wide) → npm install.
      - name: Install e2e deps
        run: npm install
      - name: Install Chromium (with OS deps)
        run: npx playwright install --with-deps chromium
      - name: Run Sovereign Studio v3 E2E
        run: npm run test:studio
      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: studio-e2e-report
          path: e2e/playwright-report
          retention-days: 7
