name: Sovereign Android Cloud Build & Deploy

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Install Web Dependencies & Build Assets
      run: |
        cd frontend
        npm install
        npm run build

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Capacitor Sync
      run: |
        cd frontend
        npx cap sync android

    - name: Build Release App Bundle
      run: |
        cd frontend/android
        chmod +x gradlew
        ./gradlew bundleRelease

    - name: Sign Android App Bundle
      id: sign_app
      uses: r0adkll/sign-android-release@v1
      with:
        releaseDirectory: frontend/android/app/build/outputs/bundle/release
        signingKeyBase64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        alias: ${{ secrets.ANDROID_KEY_ALIAS }}
        keyStorePassword: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        keyPassword: ${{ secrets.ANDROID_KEY_PASSWORD }}

    - name: Extract Signed AAB
      uses: actions/upload-artifact@v4
      with:
        name: build-believe-fit-aab
        path: ${{ steps.sign_app.outputs.signedReleaseFile }}

    # ── TEMPORARILY DISABLED — Play "First-Blood" Catch-22 ──────────────────
