    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --black:         #0a0a0a;
            --purple:        #6a0dad;
            --purple-light:  #8b1abf;
            --purple-dark:   #4a0880;
            --purple-deep:   #2d0550;
            --yellow:        #f5c800;
            --yellow-light:  #ffe033;
            --white:         #f9f5ff;
            --grey:          #111111;
            --mid:           #1e1e1e;
            --muted:         #777;
        }

        html { scroll-behavior: smooth; }
        body { background: var(--black); color: var(--white); font-family: 'Barlow', sans-serif; overflow-x: hidden; }

        /* ─── NAV ─── */
        nav {
            position: fixed; top: 0; left: 0; right: 0; z-index: 100;
            display: flex; align-items: center; justify-content: space-between;
            padding: 1rem 4rem;
            background: rgba(6,6,6,0.92);
            backdrop-filter: blur(14px);
            border-bottom: 2px solid var(--purple);
            transition: background 0.3s;
        }

        .nav-logo { display: flex; align-items: center; text-decoration: none; }
        .logo-part-box {
            font-family: 'Barlow Condensed', sans-serif; font-size: 1.5rem; font-weight: 800;
            color: var(--purple); border: 2.5px solid var(--yellow); padding: 0.05rem 0.5rem; line-height: 1.2;
        }
        .logo-part-mid {
            font-family: 'Barlow Condensed', sans-serif; font-size: 1.5rem; font-weight: 800; color: var(--purple);
        }
        .logo-dot-sep { color: var(--yellow); }
        .logo-part-fit {
            font-family: 'Barlow Condensed', sans-serif; font-size: 1.5rem; font-weight: 800;
            color: var(--purple); border: 2.5px solid var(--yellow); padding: 0.05rem 0.5rem; line-height: 1.2;
            margin-left: 0.35rem;
        }

        .nav-links { display: flex; gap: 2rem; list-style: none; }
        .nav-links a {
            font-family: 'Barlow Condensed', sans-serif; font-size: 0.85rem; font-weight: 700;
            letter-spacing: 2px; text-transform: uppercase; color: var(--muted); text-decoration: none;
            transition: color 0.2s;
        }
        .nav-links a:hover { color: var(--yellow); }
        .nav-cta-link {
            background: var(--yellow) !important; color: var(--black) !important;
            padding: 0.45rem 1.2rem; border-radius: 2px;
        }
        .nav-cta-link:hover { background: var(--yellow-light) !important; }
        .nav-portal-link {
            background: transparent !important;
            color: var(--yellow) !important;
            border: 1px solid var(--yellow) !important;
            padding: 0.45rem 1.1rem;
            border-radius: 2px;
            transition: background 0.2s !important;
        }
        .nav-portal-link:hover { background: rgba(245,200,0,0.1) !important; }

        /* ─── HERO ─── */
        .hero {
            min-height: 100vh;
            display: grid; grid-template-columns: 1.05fr 0.95fr;
            align-items: center; padding: 8rem 4rem 4rem;
            position: relative; overflow: hidden;
        }

                radial-gradient(ellipse 35% 35% at 15% 85%, rgba(245,200,0,0.07) 0%, transparent 60%);
        }
