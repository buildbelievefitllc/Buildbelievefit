<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
--black: #0a0a0a;
--purple: #6a0dad;
--purple-light: #8b1abf;
--purple-dark: #4a0880;
--purple-deep: #2d0550;
--yellow: #f5c800;
--yellow-light: #ffe033;
--white: #f9f5ff;
--grey: #111111;
--mid: #1e1e1e;
--muted: #777;
}

html { scroll-behavior: smooth; }
body { background: var(--black); color: var(--white); font-family: 'Barlow', sans-serif; overflow-x: hidden; }

/* ─── NAV ─── */
nav {
position: fixed; top: 0; left: 0; right: 0; z-index: 100;
background: rgba(10, 10, 10, 0.95); backdrop-filter: blur(10px);
padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center;
border-bottom: 1px solid rgba(245, 200, 0, 0.1);
}

.nav-logo {
font-family: 'Bebas Neue', sans-serif; font-size: 1.4rem; font-weight: 900;
letter-spacing: 3px; text-transform: uppercase;
}

.logo-part-box { color: var(--yellow); }
.logo-dot-sep { color: var(--yellow); margin: 0 2px; }
.logo-part-fit { color: var(--purple); }

.nav-links { display: flex; gap: 2.2rem; list-style: none; }
.nav-links a { color: var(--white); text-decoration: none; font-size: 0.9rem; font-weight: 500; letter-spacing: 1px; transition: color 0.2s; }
.nav-links a:hover { color: var(--yellow); }

.nav-cta-link { border: 2px solid var(--yellow); padding: 0.6rem 1.4rem; color: var(--yellow); }
.nav-cta-link:hover { background: var(--yellow); color: var(--black); }

.nav-portal-link {
border: 2px solid rgba(245, 200, 0, 0.5); padding: 0.6rem 1.4rem; color: var(--yellow);
font-weight: 600; transition: all 0.2s;
}

.nav-portal-link:hover { background: rgba(245,200,0,0.1) !important; }

/* ─── HERO ─── */
.hero {
margin-top: 80px; min-height: 100vh; background: linear-gradient(135deg, var(--purple-deep) 0%, var(--purple) 50%, var(--purple-light) 100%);
position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center;
}

.hero::before {
content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
background: radial-gradient(circle at 30% 50%, rgba(245, 200, 0, 0.15) 0%, transparent 50%),
radial-gradient(circle at 70% 50%, rgba(139, 26, 191, 0.2) 0%, transparent 50%);
pointer-events: none;
}

.hero-inner {
position: relative; z-index: 2; text-align: center; max-width: 900px; padding: 2rem;
animation: fadeInUp 0.8s ease-out;
}

.hero-pre { font-size: 1.1rem; color: var(--yellow); font-weight: 600; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 1rem; }

.hero-title {
font-family: 'Bebas Neue', sans-serif; font-size: clamp(2.2rem, 8vw, 5.5rem); font-weight: 900;
line-height: 1.1; margin-bottom: 1.5rem; color: var(--white); letter-spacing: 2px;
}

.hero-title strong { color: var(--yellow); display: block; }

.hero-sub { font-size: 1.3rem; color: rgba(255, 255, 255, 0.85); margin-bottom: 2.5rem; line-height: 1.6; }

.hero-cta-group { display: flex; gap: 1.2rem; justify-content: center; flex-wrap: wrap; margin-bottom: 3rem; }

.btn-yellow {
background: var(--yellow); color: var(--black); font-family: 'Barlow Condensed', sans-serif;
font-size: 0.95rem; font-weight: 800; letter-spacing: 2px; text-transform: uppercase;
text-decoration: none; padding: 1rem 2.2rem; border-radius: 2px; transition: all 0.3s;
border: none; cursor: pointer; clip-path: polygon(0 0, calc(100% - 15px) 0, 100% 100%, 15px 100%);
}

.btn-yellow:hover { background: var(--yellow-light); transform: translateY(-2px); }

.btn-ghost-w {
background: transparent; color: var(--yellow); font-family: 'Barlow Condensed', sans-serif;
font-size: 0.95rem; font-weight: 800; letter-spacing: 2px; text-transform: uppercase;
text-decoration: none; padding: 1rem 2.2rem; border: 2px solid var(--yellow); border-radius: 2px;
transition: all 0.3s; cursor: pointer; clip-path: polygon(0 0, calc(100% - 15px) 0, 100% 100%, 15px 100%);
}

.btn-ghost-w:hover { background: var(--yellow); color: var(--black); }

.hero-marquee {
background: var(--yellow); color: var(--black); padding: 0.8rem 0; overflow: hidden; position: relative;
font-family: 'Bebas Neue', sans-serif; font-size: 1.8rem; font-weight: 900; letter-spacing: 3px;
text-transform: uppercase; white-space: nowrap;
}

.marquee-track { display: flex; animation: scroll 20s linear infinite; }
.marquee-item { margin-right: 4rem; }

@keyframes scroll { from { transform: translateX(0); } to { transform: translateX(-50%); } }

/* ─── STATS ─── */
.hero-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 2rem; margin-top: 3rem; }

.stat-box {
background: rgba(255, 255, 255, 0.08); backdrop-filter: blur(10px); padding: 1.5rem;
border: 1px solid rgba(245, 200, 0, 0.2); border-radius: 4px; text-align: center;
}

.stat-num { font-family: 'Bebas Neue', sans-serif; font-size: 2.5rem; color: var(--yellow); font-weight: 900; }
.stat-label { font-size: 0.85rem; color: rgba(255, 255, 255, 0.7); text-transform: uppercase; letter-spacing: 1px; margin-top: 0.5rem; }

/* ─── SECTION STYLES ─── */
section { padding: 6rem 2rem; }

.sec-label { font-size: 0.8rem; color: var(--yellow); font-weight: 700; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 0.8rem; }
.sec-title { font-family: 'Bebas Neue', sans-serif; font-size: clamp(2rem, 5vw, 3.5rem); font-weight: 900; line-height: 1.1; color: var(--white); margin-bottom: 2rem; }

/* ─── SERVICES ─── */
#services { background: var(--black); }

.svc-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 2rem; margin-top: 3rem; }

.svc-card {
background: linear-gradient(135deg, rgba(106, 10, 173, 0.2) 0%, rgba(139, 26, 191, 0.1) 100%);
border: 1px solid rgba(245, 200, 0, 0.2); padding: 2.5rem; border-radius: 4px;
transition: all 0.3s; position: relative; overflow: hidden;
}

.svc-card::before {
content: ''; position: absolute; top: -50%; right: -50%; width: 100%; height: 100%;
background: radial-gradient(circle, rgba(245, 200, 0, 0.1) 0%, transparent 70%);
transition: all 0.3s;
}

.svc-card:hover { border-color: var(--yellow); transform: translateY(-4px); }
.svc-card:hover::before { top: -30%; right: -30%; }

.svc-icon { font-size: 2.5rem; margin-bottom: 1rem; }
.svc-title { font-family: 'Bebas Neue', sans-serif; font-size: 1.4rem; color: var(--yellow); margin-bottom: 0.8rem; letter-spacing: 1px; }
.svc-desc { color: rgba(255, 255, 255, 0.75); line-height: 1.6; font-size: 0.95rem; }

/* ─── ABOUT ─── */
#about {
background: linear-gradient(180deg, rgba(106, 10, 173, 0.15) 0%, transparent 100%);
}

.about-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4rem; align-items: center; margin-top: 2rem; }

.about-image { width: 100%; border-radius: 4px; overflow: hidden; border: 2px solid var(--yellow); box-shadow: 0 20px 60px rgba(245, 200, 0, 0.1); }
.about-image img { width: 100%; height: auto; display: block; }

.about-content h3 { font-family: 'Bebas Neue', sans-serif; font-size: 1.8rem; color: var(--yellow); margin-bottom: 1.5rem; letter-spacing: 1px; }
.about-content p { color: rgba(255, 255, 255, 0.8); line-height: 1.8; margin-bottom: 1.5rem; font-size: 1rem; }

.about-quote {
background: rgba(245, 200, 0, 0.1); border-left: 4px solid var(--yellow); padding: 1.5rem;
margin: 2rem 0; font-size: 1.1rem; color: var(--yellow); font-style: italic; line-height: 1.7;
}

.pillars { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 1.5rem; margin-top: 2rem; }

.pillar {
background: rgba(139, 26, 191, 0.15); border: 1px solid var(--yellow); padding: 1.5rem;
border-radius: 4px; text-align: center;
}

.pillar-label { font-weight: 700; color: var(--yellow); margin-bottom: 0.8rem; }
.pillar-bar { width: 100%; height: 6px; background: rgba(255, 255, 255, 0.1); border-radius: 3px; overflow: hidden; }
.pillar-fill { height: 100%; background: var(--yellow); width: 95%; border-radius: 3px; }

@media (max-width: 768px) {
.about-grid { grid-template-columns: 1fr; }
}

/* ─── PROGRAMS ─── */
#programs { background: var(--black); }

.prog-hd { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 3rem; }
.prog-hd div { flex: 1; }

.prog-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 2rem; }

.prog-card {
background: linear-gradient(135deg, rgba(106, 10, 173, 0.2) 0%, rgba(139, 26, 191, 0.1) 100%);
border: 1px solid rgba(245, 200, 0, 0.2); padding: 2.5rem; border-radius: 4px;
position: relative; transition: all 0.3s;
}

.prog-card.feat { border: 2px solid var(--yellow); transform: scale(1.05); }
.prog-card:hover { border-color: var(--yellow); }

.prog-hot { position: absolute; top: 1.5rem; right: 1.5rem; background: var(--yellow); color: var(--black); padding: 0.4rem 0.8rem; font-weight: 700; font-size: 0.75rem; border-radius: 20px; }

.prog-lbl { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 0.5rem; }
.prog-name { font-family: 'Bebas Neue', sans-serif; font-size: 1.8rem; color: var(--yellow); margin-bottom: 1rem; line-height: 1.1; }
