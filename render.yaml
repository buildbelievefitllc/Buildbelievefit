# render.yaml — Render Blueprint (Infrastructure as Code)
# ─────────────────────────────────────────────────────────────────────────────
# Adds the BBF React Command Center as a NEW, ISOLATED static site ALONGSIDE the
# existing `bbf-vault-webhook` backend.
#
# ⚠️ This file declares ONLY the new static site, on purpose. The webhook web
# service was created MANUALLY in the Render dashboard with its own secrets
# (SERVICE_ROLE key, admin token, Gemini/Anthropic keys, …). A Render Blueprint
# never deletes or modifies services it does not define, so connecting this
# Blueprint creates the static site WITHOUT touching the live backend. Do not add
# the webhook here — that would risk overwriting its dashboard-managed config.
#
# Vite inlines VITE_* vars at BUILD time, so Render injects them into the build.
# The publishable anon key is safe in the client bundle (RLS is the real boundary;
# privileged reads go through the token-gated edge function) but is kept out of
# the repo via `sync: false` — set once in the Render UI.
services:
  - type: web
    runtime: static
    name: bbf-command-center
    rootDir: frontend                       # build context = /frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist               # resolves to frontend/dist
    pullRequestPreviewsEnabled: true        # auto per-PR preview URLs (mobile-friendly)
    buildFilter:
      paths:
        - frontend/**                        # only rebuild when the frontend changes
    envVars:
      - key: NODE_VERSION
        # Vite 8 requires Node ^20.19.0 || >=22.12.0. Render's "20" alias resolved to a
        # 20.x below 20.19, so Vite refused to run and the static deploy failed. Pin to
        # 22 (matches the validated local build env) to clear the floor with headroom.
        value: "22"
      - key: VITE_SUPABASE_URL
        value: https://ihclbceghxpuawymlvgi.supabase.co
      - key: VITE_SUPABASE_ANON_KEY
        sync: false                          # enter once in the Render dashboard
    # ── ROUTING (Render-native) ────────────────────────────────────────────────
    # Render Static Sites do NOT read Netlify-style `public/_redirects` — routing
    # MUST live here as render.yaml `routes`. (PR #219 mistakenly moved the SPA
    # catch-all into _redirects, which Render ignored → /bbf-app.html 404'd. This
    # restores the render.yaml routes that worked through Phases 8.5–18.)
    #
    # Render serves physically-present files FIRST (so dist/privacy.html and
    # dist/terms.html are served directly — the 200 legal docs, never shadowed).
    # Routes below are evaluated top-to-bottom, first match wins, for paths with
    # NO matching file: legacy .html paths fall through to the SPA rewrite, then
    # React Router redirects them client-side (App.jsx: "*" -> "/"; /bbf-app.html,
    # /admin.html, etc. resolve to the marketing landing / auth gate in-app).
    routes:
      # Legacy app/admin entry points → the React auth gate (301).
      - { type: redirect, source: /bbf-app.html, destination: /login }
      - { type: redirect, source: /admin.html, destination: /login }
      - { type: redirect, source: /mastermind-portal.html, destination: /login }
      - { type: redirect, source: /coach-lab.html, destination: /login }
      - { type: redirect, source: /lab-editor.html, destination: /login }
      - { type: redirect, source: /app, destination: /login }
      - { type: redirect, source: /portal, destination: /login }
      # Legacy marketing / funnel pages → the React marketing landing (301).
      - { type: redirect, source: /index.html, destination: / }
      - { type: redirect, source: /sports-hub.html, destination: / }
      - { type: redirect, source: /playbooks.html, destination: / }
      - { type: redirect, source: /busy-parent-transformation.html, destination: / }
      # Post-checkout / thank-you pages (no React equivalent yet) → landing (301).
      - { type: redirect, source: /payment-success.html, destination: / }
      - { type: redirect, source: /thank-you.html, destination: / }
      - { type: redirect, source: /gracias.html, destination: / }
      - { type: redirect, source: /obrigado.html, destination: / }
      # Content Studio — the legacy standalone v3 HTML has been removed. The studio
      # is now the React "Studio V4" panel inside the admin-gated Command Center, so
      # /studio 301-redirects there. MUST precede the SPA catch-all below
      # (routes are first-match-wins, top-to-bottom).
      - { type: redirect, source: /studio, destination: /command/studio-v4 }
      # SPA CATCH-ALL — MUST be last. Any unmatched path serves the React shell;
      # React Router then owns all client-side routing.
      - { type: rewrite, source: /*, destination: /index.html }
    headers:
      - path: /*
        name: X-Content-Type-Options
        value: nosniff

  # ── BP Tracker PWA (bp-tracker/) ───────────────────────────────────────────
  # A dedicated, distraction-free Blood Pressure Tracker, isolated from the
  # Command Center. Its own static site so the two never share a bundle.
  # Physically-present files (sw.js, manifest.json, icons) are served first;
  # everything else falls through to the SPA shell.
  - type: web
    runtime: static
    name: bbf-bp-tracker
    rootDir: bp-tracker
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    pullRequestPreviewsEnabled: true
    buildFilter:
      paths:
        - bp-tracker/**
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: VITE_SUPABASE_URL
        value: https://ihclbceghxpuawymlvgi.supabase.co
      - key: VITE_SUPABASE_ANON_KEY
        sync: false                          # enter once in the Render dashboard
      - key: VITE_VAPID_PUBLIC_KEY
        sync: false                          # VAPID public key (safe to expose)
    routes:
      # SPA catch-all. sw.js / manifest.json / icons exist on disk and are
      # served directly (Render matches physical files before routes).
      - { type: rewrite, source: /*, destination: /index.html }
    headers:
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      # The service worker must be allowed to control the whole origin.
      - path: /sw.js
        name: Service-Worker-Allowed
        value: /
