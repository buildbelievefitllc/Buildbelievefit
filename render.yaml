# Render Blueprint · paste this repo's URL into Render's
# "New +" → "Blueprint" picker and Render reads this file.
services:
  - type:            web
    name:            vision-scout
    runtime:         docker
    rootDir:         vision-scout
    plan:            starter
    healthCheckPath: /health
    autoDeploy:      true
    envVars:
      - key:  ANTHROPIC_API_KEY
        sync: false
      - key:  GITHUB_WEBHOOK_SECRET
        sync: false
      - key:  SCAN_API_KEY
        sync: false
      - key:  SLACK_WEBHOOK_URL
        sync: false
      - key:  DISCORD_WEBHOOK_URL
        sync: false
      - key:   PROD_URL
        value: https://buildbelievefit.fitness
      - key:   VISION_MODEL
        value: claude-sonnet-4-6
      - key:   PLAYWRIGHT_TIMEOUT_MS
        value: "30000"
      - key:   ANTHROPIC_TIMEOUT_MS
        value: "60000"
      # ── Marketing engine ──────────────────────────────────────────
      - key:  GEMINI_API_KEY
        sync: false
      - key:  RESEND_API_KEY
        sync: false
      - key:  SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key:  BBF_MARKETING_ADMIN_TOKEN
        sync: false
      - key:   SUPABASE_URL
        value: https://ihclbceghxpuawymlvgi.supabase.co
      - key:   GEMINI_MODEL
        value: gemini-3.5-flash
      - key:   BBF_FROM_NAME
        value: Akeem Brown
      - key:   BBF_FROM_EMAIL
        value: buildbelievefitllc@buildbelievefit.fitness
      - key:   BBF_REPLY_TO
        value: buildbelievefitllc@buildbelievefit.fitness
      - key:   BBF_BUSINESS_ADDRESS
        value: Build Believe Fit · USA
      - key:   BBF_UNSUB_BASE_URL
        value: https://vision-scout.onrender.com
      # ── Orchestrator (daily marketing cron) ───────────────────────
      - key:   BBF_ORCHESTRATOR_CRON
        value: 0 14 * * *
      - key:   BBF_ORCH_ANALYZE_BATCH
        value: "25"
      - key:   BBF_ORCH_DISPATCH_BATCH
        value: "25"
      - key:   BBF_SCOUT_USE_DEMO_SEEDS
        value: "false"
